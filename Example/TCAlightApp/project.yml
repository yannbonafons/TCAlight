name: TCAlightApp
options:
  bundleIdPrefix: com.example
targets:
  TCAlightApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.yannbonafons.TCAlight
      SWIFT_VERSION: "6.3"
      SWIFT_STRICT_CONCURRENCY: complete
      SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
      SWIFT_APPROACHABLE_CONCURRENCY: YES
    sources:
      - Sources
    dependencies:
      - package: TCAlight
packages:
  TCAlight:
    path: ../../
